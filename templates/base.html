<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}EDA Service{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header>
  <div class="hdr-inner">
    <a href="{{ url_for('home') }}" class="logo">EDA <em>Service</em></a>
    <nav>
      <a href="{{ url_for('ingest_page') }}">Ingest</a>
      <a href="{{ url_for('fetch_ic_page') }}">Fetch IC</a>
      <a href="{{ url_for('analyze_select') }}">Analyze</a>
      <a href="{{ url_for('compare_select') }}">Compare</a>
    </nav>
  </div>
</header>

<main>{% block content %}{% endblock %}</main>

<footer>Exploratory Data Analysis Service</footer>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
